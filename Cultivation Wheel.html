<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cultivation Traits Spinner</title>
    <style>
        body {
            font-family: monospace;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        .wheel-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            width: 540px;
        }
        .canvas-container {
            position: relative;
            width: 500px;
            height: 500px;
        }
        canvas {
            border-radius: 50%;
            border: 2px solid #555;
        }
        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #ff4444;
            z-index: 10;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            font-family: monospace;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
        button:hover {
            background: #444;
        }
        button:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #000;
            border: 1px solid #444;
            width: 100%;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .result-name {
            font-size: 18px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 10px;
            text-align: center;
        }
        .result-desc {
            font-size: 14px;
            color: #ccc;
            line-height: 1.4;
            text-align: justify;
        }
        .tier-label {
            font-size: 12px;
            color: #ffaa00;
            text-align: center;
            margin-bottom: 5px;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            text-align: center;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Spirit Root Wheel -->
        <div class="wheel-wrapper">
            <h2>SPIRIT ROOT</h2>
            <div class="canvas-container">
                <div class="pointer"></div>
                <canvas id="rootCanvas" width="500" height="500"></canvas>
            </div>
            <button id="spinRootBtn">Spin Spirit Root</button>
            <div class="result" id="rootResult">
                <div class="tier-label">-</div>
                <div class="result-name">WAITING FOR INPUT</div>

            </div>
        </div>

            </div>
            <button id="spinPhysiqueBtn">Spin Physique/Bloodline</button>
            <div class="result" id="physiqueResult">
                <div class="tier-label">-</div>
                <div class="result-name">WAITING FOR INPUT</div>
                <div class="result-desc">-</div>
            </div>
        </div>
    </div>

        const physiqueTiers = {

        };

        const physiques = [

            { name: "Star-Forged", desc: "Body density scales with exposure to starlight.", tier: physiqueTiers.MYTHIC },

            { name: "Celestial Deity", desc: "Emits a suppression aura against lower-tier bloodlines.", tier: physiqueTiers.MYTHIC },
            { name: "Void Behemoth", desc: "Stomach acts as a spatial pocket; devours matter for energy.", tier: physiqueTiers.MYTHIC },
            { name: "Star Devourer", desc: "Absorbs kinetic energy to fuel spatial jumps.", tier: physiqueTiers.MYTHIC },
            { name: "Deep Sea Kraken", desc: "Generates localized high-pressure liquid domains.", tier: physiqueTiers.MYTHIC },
            { name: "Immortal Phoenix", desc: "Grants absolute immunity to fire and self-immolation healing.", tier: physiqueTiers.MYTHIC },
            { name: "Heaven-Devouring", desc: "Bypasses standard digestion; directly assimilates artifacts for permanent stats.", tier: physiqueTiers.MYTHIC },

            { name: "Emperor's Sovereign", desc: "Grants absolute command over lower-tier entities and tamed beasts.", tier: physiqueTiers.MYTHIC }

        class Wheel {
            constructor(canvasId, buttonId, resultId, items, onStopCallback = null) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.button = document.getElementById(buttonId);
                
                this.resultContainer = document.getElementById(resultId);
                this.tierDiv = this.resultContainer.querySelector('.tier-label');
                this.nameDiv = this.resultContainer.querySelector('.result-name');
                this.descDiv = this.resultContainer.querySelector('.result-desc');
                
                this.onStopCallback = onStopCallback;
                
                this.centerX = this.canvas.width / 2;
                this.centerY = this.canvas.height / 2;
                this.radius = this.centerX;

                this.currentAngle = 0;
                this.spinVelocity = 0;
                this.isSpinning = false;
                this.animationFrame = null;

                this.setItems(items);

                if (this.button) {
                    this.button.addEventListener('click', () => this.spin());
                }
            }

            setItems(newItems) {
                this.items = newItems;
                this.totalWeight = this.items.reduce((sum, item) => sum + item.tier.weight, 0);
                this.currentAngle = 0;
                this.drawWheel();
            }

            drawWheel() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                let startAngle = this.currentAngle;

                for (let i = 0; i < this.items.length; i++) {
                    const item = this.items[i];
                    // If all items have equal weight (like sub-wheels), sliceAngle will be equal.
                    const sliceAngle = (item.tier.weight / this.totalWeight) * 2 * Math.PI;
                    const endAngle = startAngle + sliceAngle;

                    this.ctx.beginPath();
                    this.ctx.moveTo(this.centerX, this.centerY);
                    this.ctx.arc(this.centerX, this.centerY, this.radius, startAngle, endAngle);
                    this.ctx.closePath();

                    this.ctx.fillStyle = i % 2 === 0 ? item.tier.color : this.adjustColor(item.tier.color, 15);
                    this.ctx.fill();
                    this.ctx.strokeStyle = '#222';
                    this.ctx.lineWidth = 1;
                    this.ctx.stroke();

                    if (sliceAngle > 0.05) {
                        this.ctx.save();
                        this.ctx.translate(this.centerX, this.centerY);
                        this.ctx.rotate(startAngle + sliceAngle / 2);
                        this.ctx.textAlign = "right";
                        this.ctx.textBaseline = "middle";
                        this.ctx.fillStyle = "#ffffff";
                        let fontSize = Math.min(10, Math.max(6, sliceAngle * 50));
                        this.ctx.font = `${fontSize}px monospace`;
                        this.ctx.fillText(item.name, this.radius - 15, 0);
                        this.ctx.restore();
                    }

                    startAngle += sliceAngle;
                }
            }

            adjustColor(hex, amt) {
                let usePound = false;
                if (hex[0] == "#") {
                    hex = hex.slice(1);
                    usePound = true;
                }
                let num = parseInt(hex, 16);
                let r = (num >> 16) + amt;
                if (r > 255) r = 255; else if (r < 0) r = 0;
                let b = ((num >> 8) & 0x00FF) + amt;
                if (b > 255) b = 255; else if (b < 0) b = 0;
                let g = (num & 0x0000FF) + amt;
                if (g > 255) g = 255; else if (g < 0) g = 0;
                return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
            }

            spin() {
                if (this.isSpinning) return;
                
                this.isSpinning = true;
                if(this.button) this.button.disabled = true;
                this.tierDiv.innerText = "-";
                this.nameDiv.innerText = "CALCULATING...";
                this.nameDiv.style.color = "#888";
                this.descDiv.innerText = "-";

                this.spinVelocity = Math.random() * 0.2 + 0.3;
                this.animate();
            }

            animate() {
                this.currentAngle += this.spinVelocity;
                this.currentAngle %= (2 * Math.PI);
                
                this.drawWheel();

                this.spinVelocity *= 0.985;

                if (this.spinVelocity < 0.001) {
                    this.stop();
                } else {
                    this.animationFrame = requestAnimationFrame(() => this.animate());
                }
            }

            stop() {
                this.isSpinning = false;
                cancelAnimationFrame(this.animationFrame);

                // Pointer sits at the top of the canvas, which is -π/2 in canvas angle space.
                // We need to un-rotate it by currentAngle to find the slice underneath.
                const pointerAngle = ((-Math.PI / 2) - this.currentAngle % (2 * Math.PI) + 4 * Math.PI) % (2 * Math.PI);

                let startAngle = 0;
                let selectedItem = this.items[0];

                for (let i = 0; i < this.items.length; i++) {
                    const sliceAngle = (this.items[i].tier.weight / this.totalWeight) * 2 * Math.PI;
                    if (pointerAngle >= startAngle && pointerAngle < startAngle + sliceAngle) {
                        selectedItem = this.items[i];
                        break;
                    }
                    startAngle += sliceAngle;
                }

                this.tierDiv.innerText = selectedItem.tier.label;
                this.nameDiv.innerText = selectedItem.name;
                this.nameDiv.style.color = '#00ffcc';
                this.descDiv.innerText = selectedItem.desc;

                if (this.button) this.button.disabled = false;

                if (this.onStopCallback) {
                    this.onStopCallback(selectedItem);
                }
            }
        }

        let subWheel = null;

        const physiqueWheel = new Wheel('physiqueCanvas', 'spinPhysiqueBtn', 'physiqueResult', physiques);

        const rootWheel = new Wheel('rootCanvas', 'spinRootBtn', 'rootResult', spiritRoots, (item) => {
            const subContainer = document.getElementById('subWheelContainer');
            if (item.hasSub && item.subItems) {
                subContainer.style.display = 'flex';
                if (!subWheel) {
                    subWheel = new Wheel('subCanvas', 'spinSubBtn', 'subResult', item.subItems);
                } else {
                    subWheel.setItems(item.subItems);
                }
                setTimeout(() => subWheel.spin(), 600);
            } else {
                subContainer.style.display = 'none';
            }
        });
    </script>
